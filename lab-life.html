<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab Life · Ragunathan Lab</title>
<meta name="description" content="Conferences, celebrations, field trips, and the everyday life of the Ragunathan Lab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Source+Code+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
html { scroll-behavior: smooth; }
body { margin: 0; background: #f6f1e7; -webkit-font-smoothing: antialiased; }
::selection { background: #b33e3e; color: #f6f1e7; }

.lablife {
  position: relative; background: #f6f1e7; color: #1a1714;
  font-family: 'Zen Kaku Gothic New', 'Helvetica Neue', sans-serif; font-size: 17px; line-height: 1.75;
  overflow-x: hidden; --beni: #b33e3e;
}
.grain {
  position: fixed; inset: 0; z-index: 9000; pointer-events: none; opacity: 0.022;
  background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
}

.nav {
  position: sticky; top: 0; z-index: 500; display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 5vw; background: rgba(246,241,231,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(26,23,20,0.06);
}
.nav-back {
  display: flex; align-items: center; gap: 0.6rem; font-family: 'Crimson Pro', Georgia, serif; font-size: 1.05rem;
  font-weight: 500; color: #3a352e; text-decoration: none;
}
.nav-back-arrow { font-size: 1.1rem; line-height: 0; }
.nav-tag { font-family: 'Source Code Pro', monospace; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--beni); }

.header { padding: 5rem 5vw 3rem; max-width: 1100px; margin: 0 auto; }
.header-eyebrow {
  display: flex; align-items: center; gap: 0.8rem; font-family: 'Source Code Pro', monospace; font-size: 0.72rem;
  letter-spacing: 0.26em; text-transform: uppercase; color: #5c5549; margin-bottom: 1.5rem;
}
.header-eyebrow-rule { width: 24px; height: 1px; background: #b5aea4; display: inline-block; }
.header-title {
  font-family: 'Crimson Pro', Georgia, serif; font-size: clamp(1.9rem,3.5vw,3.1rem); font-weight: 400;
  line-height: 1.2; letter-spacing: -0.01em; margin: 0 0 1.5rem;
}
.header-text {
  font-family: 'Crimson Pro', Georgia, serif; font-size: 1.22rem; font-weight: 400; color: #3a352e;
  max-width: 600px; line-height: 1.7; margin: 0;
}

.gallery { padding: 2rem 5vw 6rem; max-width: 1100px; margin: 0 auto; }
.gallery-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
.gallery-item { margin: 0; }
.gallery-item--wide { grid-column: span 2; }
.gallery-photo {
  position: relative; width: 100%; border: 1px solid rgba(26,23,20,0.08); border-radius: 3px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: repeating-linear-gradient(45deg, #e6dcc8, #e6dcc8 11px, #ece3d2 11px, #ece3d2 22px);
}
.gallery-item .gallery-photo { aspect-ratio: 4/3; }
.gallery-item--wide .gallery-photo { aspect-ratio: 8/3; }
.gallery-photo span {
  font-family: 'Source Code Pro', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: #8a8278;
}
.gallery-caption {
  margin-top: 0.8rem; font-family: 'Crimson Pro', Georgia, serif; font-size: 0.95rem; font-style: italic; color: #5c5549;
}

@media (max-width: 700px) {
  .gallery-grid { grid-template-columns: repeat(2,1fr); }
  .gallery-item--wide { grid-column: span 2; }
}
@media (max-width: 460px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .gallery-item--wide { grid-column: span 1; }
  .gallery-item--wide .gallery-photo { aspect-ratio: 4/3; }
}

.footer {
  background: #1a1714; color: #8a8278; padding: 3rem 5vw; display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.footer-back { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.05rem; color: #e6dcc8; text-decoration: none; }
.footer-copy { font-family: 'Source Code Pro', monospace; font-size: 0.72rem; color: #8a8278; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<div class="lablife">
  <div class="grain" aria-hidden="true"></div>

  <nav class="nav">
    <a href="index.html" class="nav-back"><span class="nav-back-arrow">←</span> Ragunathan Lab</a>
    <span class="nav-tag">Lab Life</span>
  </nav>

  <header class="header">
    <div class="header-eyebrow"><span class="header-eyebrow-rule"></span>Lab Life</div>
    <h1 class="header-title">Beyond the bench</h1>
    <p class="header-text">Conferences, celebrations, field trips, and the everyday life of the lab.</p>
  </header>

  <main class="gallery">
    <div class="gallery-grid">
      <figure class="gallery-item">
        <div class="gallery-photo"><span>lab photo</span></div>
        <figcaption class="gallery-caption">Lab outing — add a caption.</figcaption>
      </figure>
      <figure class="gallery-item gallery-item--wide">
        <div class="gallery-photo"><span>lab photo</span></div>
        <figcaption class="gallery-caption">Celebrating a new paper — add a caption.</figcaption>
      </figure>
      <figure class="gallery-item">
        <div class="gallery-photo"><span>lab photo</span></div>
        <figcaption class="gallery-caption">Conference travel — add a caption.</figcaption>
      </figure>
      <figure class="gallery-item gallery-item--wide">
        <div class="gallery-photo"><span>lab photo</span></div>
        <figcaption class="gallery-caption">A day in the lab — add a caption.</figcaption>
      </figure>
      <figure class="gallery-item">
        <div class="gallery-photo"><span>lab photo</span></div>
        <figcaption class="gallery-caption">Dobby supervising — add a caption.</figcaption>
      </figure>
    </div>
  </main>

  <footer class="footer">
    <a href="index.html" class="footer-back">← Back to the Ragunathan Lab</a>
    <span class="footer-copy">© 2026 Ragunathan Lab · Brandeis University</span>
  </footer>
</div>

</body>
</html>
